<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Email Reply Generator | Effortless Communication</title>
    <meta name="description" content="Generate professional or friendly email replies instantly using AI. Detect intent and save time.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Email Reply Gen 📧</h1>
            <p>Paste the email you received, and we'll craft the perfect response.</p>
        </header>

        <main class="app-card">
            <div class="input-section">
                <div class="input-group">
                    <label for="email-input">Received Email</label>
                    <textarea id="email-input" placeholder="Paste the email content here..."></textarea>
                </div>

                <div class="controls">
                    <div class="tone-selector">
                        <button class="tone-btn active" data-tone="formal">Formal</button>
                        <button class="tone-btn" data-tone="friendly">Friendly</button>
                    </div>
                    <button id="generate-btn" class="generate-btn">
                        <span>Generate Reply</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
            </div>

            <section class="result-section" id="result-section">
                <div class="intent-badge" id="intent-badge">Detected Intent: Inquiry</div>
                
                <div class="reply-container">
                    <label>Suggested Reply</label>
                    <div class="reply-box" id="reply-box"></div>
                    <button class="copy-btn" id="copy-btn" title="Copy to clipboard">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
